name: Test Validation (dev)

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: Run in dry-run mode
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write
  id-token: write
  packages: write
  attestations: write
  checks: write

jobs:
  validate:
    name: Run validation phase against dev branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: changesets-release/main
          fetch-depth: 0

      - name: Setup runtime
        uses: savvy-web/workflow-runtime-action@main

      - name: Run release action (validation phase)
        uses: savvy-web/workflow-release-action@dev
        with:
          phase: validation
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          dry-run: ${{ inputs.dry-run }}
          release-branch: changesets-release/main
          target-branch: main
          custom-registries: ${{ secrets.CUSTOM_REGISTRIES }}
