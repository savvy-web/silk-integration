name: PR Validation

on:
  workflow_call:
    inputs:
      phase:
        description: The detected workflow phase
        type: string
        required: true
      dry-run:
        description: Run in dry-run mode
        type: boolean
        default: false

jobs:
  # Pre-publish validation only runs on release branch PRs
  pre-publish:
    name: Pre-Publish Validation
    runs-on: ubuntu-latest
    if: inputs.phase == 'validation'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup runtime
        id: runtime
        uses: savvy-web/workflow-runtime-action@main

      - name: Pre-publish validation
        uses: savvy-web/workflow-release-action@main
        with:
          phase: validation
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude-review-pat: ${{ secrets.CLAUDE_REVIEW_PAT }}
          dry-run: ${{ inputs.dry-run }}
          custom-registries: |
            https://registry.savvyweb.dev/${{ secrets.SAVVYWEB_NPM_AUTH_TOKEN }}

  # PR validation runs on ALL PRs
  validate:
    name: Code Validation
    runs-on: ubuntu-latest
    env:
      DO_NOT_TRACK: "1"
      TURBO_TELEMETRY_DISABLE: "1"
      PR_TITLE_CHECK_ID: ""
      COMMITLINT_CHECK_ID: ""
      LINT_CHECK_ID: ""
      TEST_CHECK_ID: ""
    outputs:
      pr-title-result: ${{ steps.checks.outputs.pr-title-result }}
      commitlint-result: ${{ steps.checks.outputs.commitlint-result }}
      lint-result: ${{ steps.checks.outputs.lint-result }}
      test-result: ${{ steps.checks.outputs.test-result }}
    permissions:
      contents: read
      checks: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: read
          permission-checks: write

      - name: Wait for token propagation
        run: sleep 5

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Create validation checks
        id: create-checks
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const checks = [
              { name: 'PR Title Validation', title: 'Validating PR title...', summary: 'Checking if PR title follows conventional commit format', env_key: 'PR_TITLE_CHECK_ID' },
              { name: 'Conventional Commits', title: 'Validating commit messages...', summary: 'Checking if all commit messages follow conventional commit format', env_key: 'COMMITLINT_CHECK_ID' },
              { name: 'Code Quality', title: 'Running linter...', summary: 'Checking code quality with Biome', env_key: 'LINT_CHECK_ID' },
              { name: 'Tests', title: 'Running tests...', summary: 'Executing test suite', env_key: 'TEST_CHECK_ID' }
            ];
            for (const check of checks) {
              const { data: createdCheck } = await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head_sha: context.payload.pull_request.head.sha,
                name: check.name,
                status: 'in_progress',
                output: { title: check.title, summary: check.summary }
              });
              core.exportVariable(check.env_key, createdCheck.id);
            }

      - name: Setup runtime
        id: runtime
        uses: savvy-web/workflow-runtime-action@main

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Validate PR Title
        id: pr-title-check
        continue-on-error: true
        run: |
          set +e
          pnpm exec commitlint --config lib/configs/commitlint.config.ts <<< "${{ github.event.pull_request.title }}"
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          exit 0

      - name: Update PR Title Check
        if: always()
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const exitCode = '${{ steps.pr-title-check.outputs.exit_code }}';
            const conclusion = exitCode === '0' ? 'success' : 'failure';
            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: '${{ env.PR_TITLE_CHECK_ID }}',
              status: 'completed',
              conclusion,
              output: {
                title: conclusion === 'success' ? 'PR title is valid' : 'PR title is invalid',
                summary: conclusion === 'success' ? 'PR title follows conventional commit format' : 'PR title must follow conventional commit format'
              }
            });

      - name: Validate Commits
        id: commitlint-check
        continue-on-error: true
        run: |
          set +e
          pnpm exec commitlint --from=origin/${{ github.base_ref }} --to=HEAD --config lib/configs/commitlint.config.ts --verbose > commitlint-results.txt 2>&1
          COMMITLINT_EXIT_CODE=$?
          node .github/scripts/commitlint-annotate.js 2>/dev/null || true
          echo "exit_code=$COMMITLINT_EXIT_CODE" >> $GITHUB_OUTPUT
          exit 0

      - name: Update Commitlint Check
        if: always()
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const exitCode = '${{ steps.commitlint-check.outputs.exit_code }}';
            const conclusion = exitCode === '0' ? 'success' : 'failure';
            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: '${{ env.COMMITLINT_CHECK_ID }}',
              status: 'completed',
              conclusion,
              output: {
                title: conclusion === 'success' ? 'All commits are valid' : 'Commits have errors',
                summary: conclusion === 'success' ? 'All commit messages follow conventional commit format' : 'Some commits do not follow conventional format'
              }
            });

      - name: Run Biome Lint
        id: lint-check
        continue-on-error: true
        run: |
          set +e
          biome ci .
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          exit 0

      - name: Update Lint Check
        if: always()
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const exitCode = '${{ steps.lint-check.outputs.exit_code }}';
            const conclusion = exitCode === '0' ? 'success' : 'failure';
            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: '${{ env.LINT_CHECK_ID }}',
              status: 'completed',
              conclusion,
              output: {
                title: conclusion === 'success' ? 'Code quality checks passed' : 'Code quality checks failed',
                summary: conclusion === 'success' ? 'All Biome checks passed' : 'Biome found issues'
              }
            });

      - name: Run Tests
        id: test-check
        continue-on-error: true
        run: |
          set +e
          pnpm ci:test
          EXIT_CODE=$?
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          [ $EXIT_CODE -eq 0 ] && echo "✅ All tests passed!" >> $GITHUB_STEP_SUMMARY || echo "❌ Some tests failed." >> $GITHUB_STEP_SUMMARY
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          exit 0

      - name: Update Test Check
        if: always()
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const exitCode = '${{ steps.test-check.outputs.exit_code }}';
            const conclusion = exitCode === '0' ? 'success' : 'failure';
            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: '${{ env.TEST_CHECK_ID }}',
              status: 'completed',
              conclusion,
              output: {
                title: conclusion === 'success' ? 'All tests passed' : 'Some tests failed',
                summary: conclusion === 'success' ? 'All test suites passed' : 'Some tests failed'
              }
            });

      - name: Set check outputs
        id: checks
        if: always()
        run: |
          [ "${{ steps.pr-title-check.outputs.exit_code }}" == "0" ] && echo "pr-title-result=success" >> $GITHUB_OUTPUT || echo "pr-title-result=failure" >> $GITHUB_OUTPUT
          [ "${{ steps.commitlint-check.outputs.exit_code }}" == "0" ] && echo "commitlint-result=success" >> $GITHUB_OUTPUT || echo "commitlint-result=failure" >> $GITHUB_OUTPUT
          [ "${{ steps.lint-check.outputs.exit_code }}" == "0" ] && echo "lint-result=success" >> $GITHUB_OUTPUT || echo "lint-result=failure" >> $GITHUB_OUTPUT
          [ "${{ steps.test-check.outputs.exit_code }}" == "0" ] && echo "test-result=success" >> $GITHUB_OUTPUT || echo "test-result=failure" >> $GITHUB_OUTPUT

  claude-review:
    name: Claude Code Review
    needs: [validate]
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.user.login == vars.APP_BOT_NAME ||
      github.event.pull_request.user.type == 'User'
    permissions:
      checks: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-checks: write

      - name: Create Claude Review check
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Claude Code Review',
              head_sha: context.payload.pull_request.head.sha,
              status: 'completed',
              conclusion: 'neutral',
              output: {
                title: 'Review skipped (test repository)',
                summary: 'This is a test repository. Claude Code Review is not configured here.'
              }
            });

  cleanup:
    name: Cleanup Checks
    needs: [validate, claude-review]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      checks: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-checks: write

      - name: Resolve in-progress checks
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const checkNames = ['PR Title Validation', 'Conventional Commits', 'Code Quality', 'Tests', 'Claude Code Review'];
            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha
            });
            const inProgress = checkRuns.check_runs.filter(c => checkNames.includes(c.name) && c.status === 'in_progress');
            for (const check of inProgress) {
              await github.rest.checks.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                check_run_id: check.id,
                status: 'completed',
                conclusion: 'neutral',
                output: { title: 'Workflow cancelled', summary: 'Check was cancelled.' }
              });
            }
