name: Release

on:
  push:
    branches:
      - main
      - changeset-release/main
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run in dry-run mode (preview only)
        required: true
        type: boolean
        default: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  release:
    name: ${{ (inputs.dry_run != false) && 'Release --dry-run' || 'Release' }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: read
          permission-checks: write

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Setup workflow runtime environment
        id: workflow-runtime
        uses: savvy-web/workflow-runtime-action@main

      - name: Run release action
        uses: savvy-web/workflow-release-action@feature/setup-flow
        with:
          token: ${{ steps.app-token.outputs.token }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude-review-pat: ${{ secrets.CLAUDE_REVIEW_PAT }}
          dry-run: ${{ inputs.dry_run || 'false' }}
