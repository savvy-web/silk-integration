name: Release

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run in dry-run mode (preview only)
        required: true
        type: boolean
        default: true

# Permissions must include everything needed by called workflows
permissions:
  contents: write
  pull-requests: write
  id-token: write
  packages: write
  attestations: write

jobs:
  control:
    name: Detect Phase
    runs-on: ubuntu-latest
    # Control job only needs read permissions
    permissions:
      contents: read
      pull-requests: read
    outputs:
      phase: ${{ steps.control.outputs.phase }}
      should_continue: ${{ steps.control.outputs.should_continue }}
      has_changesets: ${{ steps.control.outputs.has_changesets }}
      is_release_commit: ${{ steps.control.outputs.is_release_commit }}
      merged_pr_number: ${{ steps.control.outputs.merged_pr_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect workflow phase
        id: control
        uses: savvy-web/workflow-control-action@main

  branch-management:
    name: Branch Management
    needs: control
    if: needs.control.outputs.phase == 'branch-management'
    uses: ./.github/workflows/release-branch.yml
    with:
      dry-run: ${{ inputs.dry_run || false }}
    secrets: inherit

  publish:
    name: Publish
    needs: control
    if: needs.control.outputs.phase == 'publishing' || needs.control.outputs.phase == 'close-issues'
    uses: ./.github/workflows/release-publish.yml
    with:
      phase: ${{ needs.control.outputs.phase }}
      dry-run: ${{ inputs.dry_run || false }}
    secrets: inherit
